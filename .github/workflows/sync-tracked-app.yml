name: Sync tracked app

on:
  repository_dispatch:
    types: [tracked-app-updated]
  workflow_dispatch:
    inputs:
      app:
        description: "Tracked app slug, or all"
        required: true
        default: "all"

permissions:
  contents: write

concurrency:
  group: tracked-app-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync app
        id: sync
        env:
          DISPATCH_APP: ${{ github.event.client_payload.app }}
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          DISPATCH_BRANCH: ${{ github.event.client_payload.branch }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          INPUT_APP: ${{ inputs.app }}
          APP_SYNC_TOKEN: ${{ secrets.APP_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          app="${DISPATCH_APP:-${INPUT_APP:-all}}"
          repo="${DISPATCH_REPO:-}"
          branch="${DISPATCH_BRANCH:-}"
          sha="${DISPATCH_SHA:-}"

          before="$(git rev-parse HEAD)"
          args=(--app "$app" --commit)
          if [ -n "$repo" ]; then
            args+=(--source-repo "$repo")
          fi
          if [ -n "$branch" ]; then
            args+=(--source-branch "$branch")
          fi
          if [ -n "$sha" ]; then
            args+=(--source-sha "$sha")
          fi

          python scripts/sync_tracked_apps.py "${args[@]}"
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push website commit
        if: steps.sync.outputs.committed == 'true'
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if git push origin HEAD:master; then
              exit 0
            fi
            git fetch origin master
            git rebase origin/master
          done
          git push origin HEAD:master
